on: pull_request
name: Pull Request
jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18.12.x"
      - name: Cache dependencies
        uses: actions/cache@v3
        id: cache
        with:
          path: |
            node_modules
            dist
          key: ${{ runner.os }}-node-${{ hashFiles('**/yarn.lock') }}-${{ github.sha }}
      - run: yarn install
      - run: yarn build
  
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@master
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18.12.x"
      - name: Restore cache
        uses: actions/cache@v3
        with:
          path: |
            node_modules
            dist
          key: ${{ runner.os }}-node-${{ hashFiles('**/yarn.lock') }}-${{ github.sha }}
      - run: yarn lint
  
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@master
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18.12.x"
      - name: Restore cache
        uses: actions/cache@v3
        with:
          path: |
            node_modules
            dist
          key: ${{ runner.os }}-node-${{ hashFiles('**/yarn.lock') }}-${{ github.sha }}
      - run: yarn test
